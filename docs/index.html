<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agentic AI — Course Contents</title>
  <link rel="stylesheet" href="../learn-agenticai-with-skills/assets/styles.css">
  <style>
    .toc-entry {
      display: flex;
      align-items: baseline;
      gap: 1.25rem;
      padding: 1.1rem 0;
      border-bottom: 1px solid var(--border);
      text-decoration: none;
      color: inherit;
    }
    .toc-entry:first-of-type { border-top: 1px solid var(--border); }
    .toc-entry:hover { background: none; }
    .toc-entry:hover .toc-title { color: var(--accent); border-bottom-color: var(--accent); }

    .toc-num {
      font-family: var(--font-ui);
      font-size: 0.75rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
      flex-shrink: 0;
      width: 2.5rem;
    }

    .toc-body { flex: 1; }

    .toc-title {
      display: block;
      font-size: 1rem;
      font-weight: normal;
      border-bottom: 1px solid var(--border);
    }

    .toc-subtitle {
      display: block;
      font-size: 0.875rem;
      color: var(--muted);
      font-style: italic;
      margin-top: 0.2rem;
    }
  </style>
</head>
<body>
<div class="lesson-wrap">

  <header class="lesson-header">
    <div class="lesson-number">Agentic AI · Course Contents</div>
    <h1>Agentic AI Course</h1>
    <div class="lesson-subtitle">Course landing page and table of contents</div>
  </header>

  <a class="toc-entry" href="../learn-agenticai-with-skills/lessons/index.html">
    <span class="toc-num">→</span>
    <span class="toc-body">
      <span class="toc-title">Open the Agentic AI lessons</span>
      <span class="toc-subtitle">View the full course table of contents</span>
    </span>
  </a>

</div>
</body>
